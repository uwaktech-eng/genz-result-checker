<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student | Genz Edutech</title>
    <style>
        *{ box-sizing: border-box; font-family: system-ui; }
        body{ background: #f0f4fa; padding: 20px; }
        .glass{ background: rgba(255,255,255,0.9); border-radius: 32px; padding: 28px; max-width: 1000px; margin: auto; box-shadow: 0 12px 28px rgba(0,0,0,0.1); }
        .btn{ background: #1e3c72; color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; font-weight: bold; }
        input, select{ width: 100%; padding: 12px; margin: 8px 0; border-radius: 20px; border: 1px solid #ccc; }
        .report-card{ background: white; border-radius: 24px; padding: 20px; margin-top: 24px; border: 1px solid #e2e8f0; }
        .loading{ position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 999; color: white; font-size: 1.3rem; display: none; backdrop-filter: blur(6px); }
        .toast{ position: fixed; bottom: 20px; right: 20px; background: #2c3e50; color: white; padding: 12px 20px; border-radius: 40px; z-index: 1000; }
        @media print{ .no-print{ display: none; } .glass{ box-shadow: none; padding: 0; } }
    </style>
</head>
<body>
<div class="loading" id="loadingOverlay">⏳ Loading...</div>
<div class="glass" id="authContainer">
    <h2>🎓 Student Portal</h2>
    <div><button id="showLoginBtn" class="btn" style="margin-right:10px">Login</button><button id="showSignupBtn" class="btn" style="background:#aaa">Sign Up</button></div>
    <div id="loginPanel">
        <input type="text" id="loginReg" placeholder="Registration ID"><input type="password" id="loginPass" placeholder="Password"><button class="btn" id="studentLoginBtn">Login</button>
    </div>
    <div id="signupPanel" style="display:none">
        <input placeholder="RegID" id="su_reg"><input placeholder="Password" id="su_pass" type="password"><input placeholder="Full Name" id="su_name"><input placeholder="Age" id="su_age"><select id="su_gender"><option>Male</option><option>Female</option></select><input placeholder="DOB (YYYY-MM-DD)" id="su_dob"><input placeholder="Parent Name" id="su_parent"><input placeholder="Parent Phone" id="su_phone"><input placeholder="Parent Email" id="su_email"><input placeholder="School Name" id="su_school"><input placeholder="State" id="su_state"><input placeholder="City/LGA" id="su_city"><input placeholder="Class Level" id="su_class"><input placeholder="Category" id="su_cat"><textarea placeholder="Address" id="su_addr"></textarea><button class="btn" id="doStudentSignup">Register</button>
    </div>
</div>
<div id="reportArea" style="display:none"></div>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwTnf8fxSM56pTLXIw5deMGCPulj76fNoEF-geUhQlP00Wfkl-dnbKwPCBqv2oabARlXg/exec";
    function showLoad(show){ document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
    function toast(m){ let d=document.createElement('div'); d.className='toast'; d.innerText=m; document.body.appendChild(d); setTimeout(()=>d.remove(),3000); }
    function api(params, cb){ let url=WEB_APP_URL+"?"+new URLSearchParams(params).toString(); fetch(url).then(r=>r.json()).then(cb).catch(e=>toast("Network error")); }
    document.getElementById('showLoginBtn').onclick=()=>{ document.getElementById('loginPanel').style.display='block'; document.getElementById('signupPanel').style.display='none'; };
    document.getElementById('showSignupBtn').onclick=()=>{ document.getElementById('loginPanel').style.display='none'; document.getElementById('signupPanel').style.display='block'; };
    document.getElementById('studentLoginBtn').onclick=()=>{
        let reg=document.getElementById('loginReg').value, pass=document.getElementById('loginPass').value;
        if(!reg||!pass) return toast("Enter credentials");
        showLoad(true);
        api({action:'studentLogin', regID:reg, password:pass}, (res)=>{
            showLoad(false);
            if(res.status==='success'){
                document.getElementById('authContainer').style.display='none';
                renderReport(res.profile, res.results, res.settings);
            } else toast(res.message);
        });
    };
    document.getElementById('doStudentSignup').onclick=()=>{
        let data={ regID:document.getElementById('su_reg').value, password:document.getElementById('su_pass').value, fullName:document.getElementById('su_name').value, age:document.getElementById('su_age').value, gender:document.getElementById('su_gender').value, dob:document.getElementById('su_dob').value, parentName:document.getElementById('su_parent').value, parentPhone:document.getElementById('su_phone').value, parentEmail:document.getElementById('su_email').value, schoolName:document.getElementById('su_school').value, state:document.getElementById('su_state').value, cityLGA:document.getElementById('su_city').value, classLevel:document.getElementById('su_class').value, category:document.getElementById('su_cat').value, address:document.getElementById('su_addr').value };
        if(!data.regID||!data.password) return toast("RegID & password required");
        showLoad(true);
        api({action:'studentSignup', ...data}, (res)=>{ showLoad(false); toast(res.message); if(res.status==='success') document.getElementById('showLoginBtn').click(); });
    };
    function renderReport(profile, results, settings){
        let html=`<div class="glass"><div class="no-print"><button class="btn" onclick="window.print()">🖨️ Print / PDF</button><button class="btn" id="logoutBtn" style="background:#6c757d">Logout</button></div><div style="text-align:center"><h2>${settings.BRAND_NAME || 'Genz Edutech'}</h2><p>${settings.SCHOOL_NAME}<br>${settings.HEAD_OFFICE_ADDRESS}<br>📞 ${settings.SCHOOL_PHONE} ✉️ ${settings.SCHOOL_EMAIL}</p><hr><h3>Student Profile</h3><p><strong>${profile.fullName}</strong> (Reg: ${profile.regID})<br>Class: ${profile.classLevel} | Parent: ${profile.parentName}</p>${profile.passportUrl ? `<img src="${profile.passportUrl}" width="80" style="border-radius:50%">` : ''}</div>`;
        results.forEach(r=>{
            let passFail = r.studentScore >= r.passMarkNumber ? "✅ PASS" : "❌ FAIL";
            html+=`<div class="report-card"><h3>📌 ${r.examTitle} (${r.academicSession} - ${r.term})</h3><p>📅 ${r.examDate} | Score: ${r.studentScore}/${r.maxScore} (${r.percentage.toFixed(1)}%)<br>Grade: ${r.grade} | ${r.remark}<br>${r.teacherComment ? `💬 Teacher: ${r.teacherComment}` : ''}<br><strong>${passFail}</strong> ${settings.SHOW_POSITION_ON_REPORT === 'true' && r.position ? `🏅 Position: ${r.position}` : ''}</p></div>`;
        });
        html+=`<footer class="no-print" style="margin-top:20px">© ${settings.SCHOOL_NAME} | Principal: ${settings.PRINCIPAL_NAME}</footer></div>`;
        document.getElementById('reportArea').innerHTML=html; document.getElementById('reportArea').style.display='block';
        document.getElementById('logoutBtn')?.addEventListener('click',()=>{ location.reload(); });
    }
</script>
</body>
</html>
