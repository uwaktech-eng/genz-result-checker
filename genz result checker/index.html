<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genz Edutech | Result Checker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body {
            background: linear-gradient(145deg, #eef2ff 0%, #d9e4f5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .glass {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(15px);
            border-radius: 2rem;
            padding: 2.5rem;
            max-width: 1100px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.5);
        }
        h1 {
            font-size: 2.7rem;
            background: linear-gradient(135deg, #1e3c72, #2b4c7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .feature-grid { display: flex; gap: 1.5rem; flex-wrap: wrap; margin: 2rem 0; }
        .card { background: white; border-radius: 1.2rem; padding: 1.3rem; flex: 1; text-align: center; box-shadow: 0 6px 14px rgba(0,0,0,0.05); }
        .btn-group { display: flex; gap: 1rem; justify-content: center; margin-top: 1rem; }
        .btn { padding: 0.9rem 2rem; border-radius: 2rem; font-weight: 600; border: none; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #1e3c72; color: white; }
        .btn-primary:hover { background: #0e2a4f; transform: scale(1.02); }
        .btn-outline { background: transparent; border: 1px solid #1e3c72; color: #1e3c72; }
        footer { text-align: center; margin-top: 2rem; color: #4a5568; }
        @media (max-width: 700px) { .glass { padding: 1.5rem; } h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
<div class="glass">
    <h1>📘 Genz Edutech Innovations</h1>
    <p style="margin-top: 0.5rem; color:#2d3748;">Smart Result Management Portal</p>
    <div class="feature-grid">
        <div class="card">🎓 Instant Results</div><div class="card">🔒 Secure Login</div><div class="card">📱 Mobile Ready</div>
    </div>
    <div class="btn-group">
        <button class="btn btn-primary" onclick="location.href='student.html'">👩‍🎓 Student Portal</button>
        <button class="btn btn-outline" onclick="location.href='admin.html'">👨‍💼 Admin Portal</button>
    </div>
    <footer>© 2025 Genz Edutech · Powered by Google Sheets</footer>
</div>
</body>
</html>
