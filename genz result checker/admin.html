<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Genz Edutech</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui; }
        body { background: #eef2ff; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        .glass-card { background: rgba(255,255,255,0.9); border-radius: 28px; padding: 24px; margin-bottom: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); backdrop-filter: blur(4px); }
        .btn { padding: 10px 20px; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: #1e3c72; color: white; }
        input, select, textarea { width: 100%; padding: 10px; margin: 6px 0; border-radius: 16px; border: 1px solid #ccc; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px,1fr)); gap: 20px; }
        .loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 9999; color: white; font-size: 1.5rem; backdrop-filter: blur(4px); display: none; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #323232; color: white; padding: 12px 24px; border-radius: 40px; z-index: 10000; }
        .tab { display: flex; gap: 12px; margin-bottom: 20px; border-bottom: 2px solid #ddd; }
        .tab button { background: none; border: none; padding: 10px 20px; font-weight: 600; cursor: pointer; }
        .active-tab { border-bottom: 3px solid #1e3c72; color:#1e3c72; }
    </style>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay"><div>⏳ Processing...</div></div>
<div class="container" id="app">
    <div class="glass-card" id="authPanel">
        <h2>🔐 Admin Access</h2>
        <div class="tab"><button id="loginTab" class="active-tab">Login</button><button id="signupTab">Signup</button></div>
        <div id="loginForm">
            <input type="text" id="loginUser" placeholder="Username"><input type="password" id="loginPass" placeholder="Password"><button class="btn btn-primary" id="doLogin">Login</button>
        </div>
        <div id="signupForm" style="display:none">
            <input type="text" id="suUsername" placeholder="Username"><input type="password" id="suPass" placeholder="Password"><input type="text" id="suName" placeholder="Display Name"><input type="email" id="suEmail" placeholder="Email"><button class="btn btn-primary" id="doSignup">Create Admin</button>
        </div>
    </div>
    <div id="dashboard" style="display:none"></div>
</div>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzR_FrPa9nNOdYH0SfH7WskKmw3daDO67APMF_wuYHvbe4LrOGYw1yUeQyPpMDP8Uk/exec"; // CHANGE
    let adminToken = null;
    function showLoading(show) { document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; }
    function toast(msg) { let t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000); }
    function apiCall(params, callback) {
        let url = WEB_APP_URL + "?" + new URLSearchParams(params).toString();
        fetch(url).then(r=>r.json()).then(callback).catch(e=>toast("Network error"));
    }
    document.getElementById('loginTab').onclick=()=>{ document.getElementById('loginForm').style.display='block'; document.getElementById('signupForm').style.display='none'; };
    document.getElementById('signupTab').onclick=()=>{ document.getElementById('loginForm').style.display='none'; document.getElementById('signupForm').style.display='block'; };
    document.getElementById('doLogin').onclick=()=>{
        let username=document.getElementById('loginUser').value, password=document.getElementById('loginPass').value;
        if(!username||!password) return toast("Fill all");
        showLoading(true);
        apiCall({action:'adminLogin', username, password}, (res)=>{
            showLoading(false);
            if(res.status==='success') { adminToken=res.token; toast("Welcome Admin"); loadDashboard(); }
            else toast(res.message);
        });
    };
    document.getElementById('doSignup').onclick=()=>{
        let u=document.getElementById('suUsername').value, p=document.getElementById('suPass').value, dn=document.getElementById('suName').value, em=document.getElementById('suEmail').value;
        if(!u||!p) return toast("Required");
        showLoading(true);
        apiCall({action:'adminSignup', username:u, password:p, displayName:dn, email:em}, (res)=>{ showLoading(false); toast(res.message); if(res.status==='success') document.getElementById('loginTab').click(); });
    };
    function loadDashboard(){
        showLoading(true);
        apiCall({action:'getAdminBootstrap', token:adminToken}, (data)=>{
            showLoading(false);
            if(data.status!=='success') return toast("Session expired");
            renderDashboard(data);
        });
    }
    function renderDashboard(d){
        let html=`<div class="glass-card"><h2>📊 Stats</h2><p>Students: ${d.stats.totalStudents} | Results: ${d.stats.totalResults}</p></div>
        <div class="glass-card"><h2>⚙️ Settings</h2><div id="settingsForm">${Object.entries(d.settings).map(([k,v])=>`<label>${k}</label><input id="set_${k}" value="${v}">`).join('')}<button class="btn btn-primary" id="saveSettingsBtn">Save Settings</button></div></div>
        <div class="glass-card"><h2>👨‍🎓 Create/Update Student</h2><div id="studentForm"></div><button class="btn btn-primary" id="saveStudentBtn">Save Student</button></div>
        <div class="glass-card"><h2>📝 Save Result</h2><div id="resultForm"></div><button class="btn btn-primary" id="saveResultBtn">Publish Result</button></div>
        <div class="glass-card"><h2>📋 Recent Students</h2><ul>${d.students.map(s=>`<li>${s.regID} - ${s.name}</li>`).join('')}</ul></div>
        <div class="glass-card"><h2>📋 Recent Results</h2><ul>${d.results.map(r=>`<li>${r.regID} - ${r.exam} - Score:${r.score}</li>`).join('')}</ul></div>`;
        document.getElementById('dashboard').style.display='block'; document.getElementById('authPanel').style.display='none';
        document.getElementById('dashboard').innerHTML=html;
        document.getElementById('saveSettingsBtn').onclick=()=>{ let sets={}; for(let k in d.settings) sets[k]=document.getElementById(`set_${k}`).value; showLoading(true); apiCall({action:'saveSettings', token:adminToken, settings:JSON.stringify(sets)}, (res)=>{ showLoading(false); toast(res.message); }); };
        document.getElementById('studentForm').innerHTML=`<input placeholder="RegID" id="s_reg"><input placeholder="FullName" id="s_name"><input placeholder="Password (leave if not change)" id="s_pass" type="password"><input placeholder="Age" id="s_age"><select id="s_gender"><option>Male</option><option>Female</option></select><input placeholder="DOB" id="s_dob"><input placeholder="ParentName" id="s_parent"><input placeholder="Phone" id="s_phone"><input placeholder="Email" id="s_email"><input placeholder="School" id="s_school"><input placeholder="State" id="s_state"><input placeholder="CityLGA" id="s_city"><input placeholder="Class" id="s_class"><input placeholder="Category" id="s_cat"><textarea placeholder="Address" id="s_addr"></textarea><input placeholder="PassportUrl" id="s_url">`;
        document.getElementById('saveStudentBtn').onclick=()=>{ let student={ regID:document.getElementById('s_reg').value, fullName:document.getElementById('s_name').value, password:document.getElementById('s_pass').value, age:document.getElementById('s_age').value, gender:document.getElementById('s_gender').value, dob:document.getElementById('s_dob').value, parentName:document.getElementById('s_parent').value, parentPhone:document.getElementById('s_phone').value, parentEmail:document.getElementById('s_email').value, schoolName:document.getElementById('s_school').value, state:document.getElementById('s_state').value, cityLGA:document.getElementById('s_city').value, classLevel:document.getElementById('s_class').value, category:document.getElementById('s_cat').value, address:document.getElementById('s_addr').value, passportUrl:document.getElementById('s_url').value }; showLoading(true); apiCall({action:'saveStudent', token:adminToken, student:JSON.stringify(student)}, (res)=>{ showLoading(false); toast(res.message); }); };
        document.getElementById('resultForm').innerHTML=`<input placeholder="RegID" id="r_reg"><input placeholder="Exam Title" id="r_title"><input placeholder="Max Score" id="r_max"><input placeholder="Student Score" id="r_score"><input placeholder="Academic Session" id="r_sess"><input placeholder="Term" id="r_term"><textarea placeholder="Teacher Comment" id="r_comment"></textarea><label><input type="checkbox" id="r_pub"> Published</label>`;
        document.getElementById('saveResultBtn').onclick=()=>{ let result={ regID:document.getElementById('r_reg').value, examTitle:document.getElementById('r_title').value, maxScore:parseInt(document.getElementById('r_max').value), studentScore:parseInt(document.getElementById('r_score').value), academicSession:document.getElementById('r_sess').value, term:document.getElementById('r_term').value, teacherComment:document.getElementById('r_comment').value, published:document.getElementById('r_pub').checked, examDate:new Date().toISOString().split('T')[0], passMarkNumber:40, passMarkPercentage:40 }; showLoading(true); apiCall({action:'saveResult', token:adminToken, result:JSON.stringify(result)}, (res)=>{ showLoading(false); toast(res.message); }); };
    }
</script>
</body>
</html>
