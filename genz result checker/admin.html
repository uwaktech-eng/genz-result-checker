<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal - Genz Edutech</title>
    <style>
        :root { --primary: #0f172a; --accent: #10b981; --bg: #f8fafc; --glass: rgba(255,255,255,0.9); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg); color: #333; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Auth */
        .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(135deg, #d1fae5 0%, #f8fafc 100%); }
        .glass-card { background: var(--glass); backdrop-filter: blur(10px); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .glass-card h2 { margin-bottom: 20px; text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #059669; }
        .toggle-link { text-align: center; margin-top: 15px; cursor: pointer; color: var(--accent); font-size: 0.9rem; }
        
        /* Dashboard & Report */
        #portal-view { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 2px solid #eee; margin-bottom: 30px; }
        .profile-card { display: flex; gap: 20px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; align-items: center;}
        .passport { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #eee; border: 3px solid var(--accent); }
        .profile-info h3 { margin-bottom: 5px; color: var(--primary); }
        .profile-info p { color: #64748b; font-size: 0.9rem; margin-bottom: 3px; }
        
        .report-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .rc-header { text-align: center; border-bottom: 2px solid #f1f5f9; padding-bottom: 20px; margin-bottom: 20px; }
        .rc-header h1 { color: var(--primary); font-size: 1.8rem; text-transform: uppercase; }
        .rc-header p { color: #64748b; margin-top: 5px; }
        
        .rc-body { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .info-box { background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .info-box p { margin-bottom: 5px; font-size: 0.95rem; }
        .info-box strong { color: var(--primary); }
        
        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .result-table th, .result-table td { border: 1px solid #cbd5e1; padding: 12px; text-align: center; }
        .result-table th { background: #f1f5f9; color: var(--primary); }
        .pass-status { font-weight: bold; padding: 4px 10px; border-radius: 4px; }
        .status-pass { background: #d1fae5; color: #065f46; }
        .status-fail { background: #fee2e2; color: #991b1b; }
        
        .teacher-remark { margin-top: 20px; padding: 15px; background: #f8fafc; border-left: 4px solid var(--accent); font-style: italic; }

        /* Loader & Toast */
        .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
        .spinner { width: 50px; height: 50px; border: 5px solid #e2e8f0; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; top: 20px; right: 20px; background: #334155; color: white; padding: 15px 25px; border-radius: 8px; transform: translateY(-100px); opacity: 0; transition: all 0.3s; z-index: 1001; }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* Print styles */
        @media print {
            body { background: white; }
            .auth-wrapper, .header, .btn, .profile-card, .toast { display: none !important; }
            .container { max-width: 100%; padding: 0; }
            .report-card { box-shadow: none; border: none; page-break-after: always; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="loader">
        <div class="spinner"></div>
        <p id="loader-text" style="margin-top: 15px; font-weight: bold; color: var(--primary);">Loading...</p>
    </div>
    <div class="toast" id="toast">Message here</div>

    <div class="auth-wrapper" id="auth-view">
        <div class="glass-card" id="login-card">
            <h2>Student Portal</h2>
            <form id="login-form">
                <div class="form-group"><label>Registration ID</label><input type="text" id="l-reg" required></div>
                <div class="form-group"><label>Password</label><input type="password" id="l-pass" required></div>
                <button type="submit" class="btn">View Results</button>
            </form>
            <div class="toggle-link" onclick="toggleAuth()">Register new account</div>
        </div>

        <div class="glass-card" id="signup-card" style="display:none; max-width: 600px;">
            <h2>Student Registration</h2>
            <form id="signup-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group" style="grid-column: span 2;"><label>Registration ID *</label><input type="text" id="s-reg" required></div>
                <div class="form-group" style="grid-column: span 2;"><label>Password *</label><input type="password" id="s-pass" required></div>
                <div class="form-group" style="grid-column: span 2;"><label>Full Name *</label><input type="text" id="s-name" required></div>
                <div class="form-group"><label>Gender</label><select id="s-gender"><option>Male</option><option>Female</option></select></div>
                <div class="form-group"><label>Class Level</label><input type="text" id="s-class"></div>
                <button type="submit" class="btn" style="grid-column: span 2;">Complete Registration</button>
            </form>
            <div class="toggle-link" onclick="toggleAuth()" style="grid-column: span 2;">Back to Login</div>
        </div>
    </div>

    <div class="container" id="portal-view">
        <div class="header">
            <h2>My Dashboard</h2>
            <div>
                <button onclick="window.print()" class="btn" style="width:auto; display:inline-block; margin-right:10px;">Print / Download PDF</button>
                <button onclick="logout()" class="btn" style="width:auto; display:inline-block; background:#dc2626;">Logout</button>
            </div>
        </div>

        <div class="profile-card">
            <img src="" alt="Passport" class="passport" id="p-passport" onerror="this.src='https://via.placeholder.com/100?text=No+Image'">
            <div class="profile-info">
                <h3 id="p-name">Student Name</h3>
                <p><strong>Reg ID:</strong> <span id="p-reg"></span></p>
                <p><strong>Class:</strong> <span id="p-class"></span> | <strong>Gender:</strong> <span id="p-gender"></span></p>
            </div>
        </div>

        <h3 style="margin-bottom: 15px; color: var(--primary);">Published Results</h3>
        <div id="results-container">
            </div>
    </div>

    <script>
        const WEB_APP_URL = 'YOUR_WEB_APP_URL_HERE'; // <--- PASTE YOUR APP SCRIPT URL HERE

        // UI Helpers
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
        function showLoader(text) { document.getElementById('loader-text').textContent = text; document.getElementById('loader').style.display = 'flex'; }
        function hideLoader() { document.getElementById('loader').style.display = 'none'; }
        function toggleAuth() {
            const lc = document.getElementById('login-card');
            const sc = document.getElementById('signup-card');
            if(lc.style.display === 'none') { lc.style.display = 'block'; sc.style.display = 'none'; }
            else { lc.style.display = 'none'; sc.style.display = 'block'; }
        }

        function logout() { location.reload(); }

        // API Wrapper
        async function apiCall(action, payload = {}) {
            try {
                const res = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action, ...payload })
                });
                return await res.json();
            } catch (err) {
                console.error(err); showToast("Network Error"); return { success: false };
            }
        }

        // Auth
        document.getElementById('signup-form').onsubmit = async (e) => {
            e.preventDefault();
            showLoader("Registering...");
            const student = {
                RegID: document.getElementById('s-reg').value,
                Password: document.getElementById('s-pass').value,
                FullName: document.getElementById('s-name').value,
                Gender: document.getElementById('s-gender').value,
                ClassLevel: document.getElementById('s-class').value
            };
            const res = await apiCall('studentSignup', { student });
            hideLoader();
            showToast(res.message);
            if(res.success) toggleAuth();
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            showLoader("Checking records...");
            const res = await apiCall('studentLogin', { 
                regId: document.getElementById('l-reg').value, 
                password: document.getElementById('l-pass').value 
            });
            hideLoader();
            
            if(res.success) {
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('portal-view').style.display = 'block';
                renderDashboard(res.student, res.results, res.settings);
            } else {
                showToast(res.message);
            }
        }

        function renderDashboard(student, results, settings) {
            // Profile
            document.getElementById('p-name').textContent = student.FullName;
            document.getElementById('p-reg').textContent = student.RegID;
            document.getElementById('p-class').textContent = student.ClassLevel || 'N/A';
            document.getElementById('p-gender').textContent = student.Gender || 'N/A';
            if(student.PassportUrl) document.getElementById('p-passport').src = student.PassportUrl;

            // Results
            const container = document.getElementById('results-container');
            container.innerHTML = '';

            if(!results || results.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding: 40px; background:white; border-radius:12px;">No published results found for this account.</p>';
                return;
            }

            results.forEach(r => {
                const passPerc = parseFloat(r.PassMarkPercentage) || 40;
                const studentPerc = parseFloat(r.Percentage) || 0;
                const isPass = studentPerc >= passPerc;
                const statusHtml = `<span class="pass-status ${isPass ? 'status-pass' : 'status-fail'}">${isPass ? 'PASS' : 'FAIL'}</span>`;
                
                const posHtml = settings.SHOW_POSITION_ON_REPORT === 'true' && r.Position ? `<p><strong>Position:</strong> ${r.Position}</p>` : '';

                const html = `
                <div class="report-card">
                    <div class="rc-header">
                        <h1>${settings.BRAND_NAME || 'Educational Portal'}</h1>
                        <p style="font-size:1.2rem; font-weight:bold; color:#333;">${settings.SCHOOL_NAME || ''}</p>
                        <p>${settings.HEAD_OFFICE_ADDRESS || ''} | ${settings.SCHOOL_PHONE || ''}</p>
                        <h2 style="margin-top:15px; color:var(--accent);">${r.ExamTitle}</h2>
                    </div>
                    
                    <div class="rc-body">
                        <div class="info-box">
                            <p><strong>Student Name:</strong> ${student.FullName}</p>
                            <p><strong>Registration ID:</strong> ${student.RegID}</p>
                            <p><strong>Class:</strong> ${student.ClassLevel || 'N/A'}</p>
                        </div>
                        <div class="info-box">
                            <p><strong>Session:</strong> ${r.AcademicSession}</p>
                            <p><strong>Term:</strong> ${r.Term}</p>
                            ${posHtml}
                        </div>
                    </div>

                    <table class="result-table">
                        <thead>
                            <tr>
                                <th>Max Score</th>
                                <th>Pass Mark</th>
                                <th>Score Obtained</th>
                                <th>Percentage</th>
                                <th>Grade</th>
                                <th>Remark</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>${r.MaxScore}</td>
                                <td>${r.PassMarkNumber} (${r.PassMarkPercentage}%)</td>
                                <td style="font-weight:bold; font-size:1.1rem;">${r.StudentScore}</td>
                                <td>${r.Percentage}%</td>
                                <td><strong>${r.Grade}</strong></td>
                                <td>${r.Remark}</td>
                                <td>${statusHtml}</td>
                            </tr>
                        </tbody>
                    </table>

                    ${r.TeacherComment ? `<div class="teacher-remark"><strong>Teacher's Comment:</strong> ${r.TeacherComment}</div>` : ''}
                </div>`;
                container.innerHTML += html;
            });
        }
    </script>
</body>
</html>
